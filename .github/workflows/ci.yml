name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        # SyntaxKind numbering differs between TypeScript 5.8 and 5.9; 6.0 deprecates
        # legacy module resolution and ships a new lib. Test the 5.x floor, 5.9, and
        # 6.x on one Node line, plus each other supported Node line on the default
        # TypeScript — the axes are independent, so skip the full cross product.
        node-version: ['22']
        typescript-version: ['5.7.3', '5.9.3', '6.0.3']
        include:
          - node-version: '20'
            typescript-version: '5.9.3'
          - node-version: '24'
            typescript-version: '5.9.3'

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Use TypeScript ${{ matrix.typescript-version }}
        run: |
          if [ "$(node -p "require('typescript').version")" != "${{ matrix.typescript-version }}" ]; then
            pnpm add -w -D -E typescript@${{ matrix.typescript-version }}
          fi

      # The matrix swaps typescript without changing any file a content hash would
      # see. Never put a task cache (nx/turbo) in front of these builds: a warm
      # cache reports success over a failing tsc.
      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Example smoke test
        run: |
          pnpm -C packages/ts-migrate-example run example
          grep -q 'first: number, second: number): number' packages/ts-migrate-example/src/input/index.ts
          git checkout -- packages/ts-migrate-example/src/input/index.ts
