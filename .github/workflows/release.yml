name: Release

on:
  workflow_dispatch:
    inputs:
      provenance:
        description: Publish with provenance attestations (uncheck to bypass a Sigstore outage)
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: github.repository == 'ObieMunoz/ts-migrate'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Configure git for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version and create GitHub release
        run: pnpm exec lerna version --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A partial publish is recovered by dispatching a fresh run: the version
      # step no-ops when HEAD is already tagged, and from-package only publishes
      # versions missing from the registry. Do not use "re-run failed jobs",
      # which checks out the pre-release commit and would version again.
      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: ${{ inputs.provenance && 'true' || 'false' }}
        run: |
          for attempt in 1 2 3; do
            if pnpm exec lerna publish from-package --yes; then
              exit 0
            fi
            echo "Publish attempt ${attempt} failed"
            # A crashed attempt leaves lerna's publish-time manifest edits in
            # the working tree, and the next attempt would refuse to run with
            # EUNCOMMIT until they are reset.
            git checkout -- .
            if [ "${attempt}" -lt 3 ]; then
              sleep 30
            fi
          done
          exit 1

      # Each package is checked at its own manifest version, not the lerna.json
      # version: a bump driven only by private-package changes moves lerna.json
      # ahead of the public manifests.
      - name: Verify published versions
        run: |
          for manifest in packages/*/package.json; do
            target=$(node -p "const p = require('./${manifest}'); p.private ? '' : p.name + '@' + p.version")
            if [ -z "${target}" ]; then
              continue
            fi
            for attempt in 1 2 3; do
              if npm view "${target}" version > /dev/null; then
                echo "${target} is on the registry"
                continue 2
              fi
              sleep 10
            done
            echo "${target} is missing from the registry"
            exit 1
          done
